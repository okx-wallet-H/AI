<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OKX AI 量化交易</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');

:root {
  --bg: #03050f;
  --card: #080d1e;
  --card2: #0d1428;
  --border: #1a2540;
  --accent: #00d4ff;
  --accent2: #7b2fff;
  --green: #00ff88;
  --red: #ff3366;
  --gold: #ffd700;
  --text: #e8f0ff;
  --muted: #4a6080;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* 动态背景 */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(123,47,255,0.05) 0%, transparent 50%);
  animation: bgMove 8s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes bgMove {
  0% { transform: translate(0,0); }
  100% { transform: translate(20px, 20px); }
}

/* 顶部Header */
.header {
  position: relative;
  padding: 24px 16px 20px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,212,255,0.08) 0%, transparent 100%);
  overflow: hidden;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
  margin-bottom: 4px;
}

.logo-sub {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* 状态栏 */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}

.status-left { display: flex; align-items: center; gap: 8px; }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  position: relative;
}

.status-dot.running {
  background: var(--green);
  box-shadow: 0 0 12px var(--green);
  animation: dotPulse 1.5s infinite;
}

.status-dot.running::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--green);
  animation: dotRing 1.5s infinite;
}

@keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes dotRing { 0%{transform:scale(1);opacity:1} 100%{transform:scale(2);opacity:0} }

#statusText { font-size: 12px; color: var(--muted); }
.status-time { font-family: 'Orbitron', monospace; font-size: 11px; color: var(--accent); }

/* 容器 */
.container { padding: 12px; max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }

/* 统计卡片 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 8px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0.5;
}

.stat-val {
  font-family: 'Orbitron', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.stat-val.green { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.5); }
.stat-val.red { color: var(--red); text-shadow: 0 0 20px rgba(255,51,102,0.5); }

.stat-label {
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 1px;
}

/* 持仓卡片 */
.position-card {
  background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,212,255,0.05));
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  display: none;
  position: relative;
  overflow: hidden;
}

.position-card.show { display: block; }
.position-card.short {
  background: linear-gradient(135deg, rgba(255,51,102,0.08), rgba(255,100,50,0.05));
  border-color: rgba(255,51,102,0.3);
}

.pos-header { display: flex; justify-content: space-between; align-items: center; }
.pos-symbol { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700; color: var(--text); }
.pos-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
.pos-badge.long { background: rgba(0,255,136,0.2); color: var(--green); border: 1px solid rgba(0,255,136,0.4); }
.pos-badge.short { background: rgba(255,51,102,0.2); color: var(--red); border: 1px solid rgba(255,51,102,0.4); }

.pos-pnl {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 900;
  margin-top: 10px;
}

.pos-pnl.positive { color: var(--green); text-shadow: 0 0 30px rgba(0,255,136,0.4); }
.pos-pnl.negative { color: var(--red); text-shadow: 0 0 30px rgba(255,51,102,0.4); }

/* 卡片 */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}

.section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* 输入框 */
label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; letter-spacing: 1px; text-transform: uppercase; }
label:first-of-type { margin-top: 0; }

.input-wrap { position: relative; }

input, select {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  transition: all 0.2s;
  appearance: none;
}

input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}

input::placeholder { color: var(--muted); font-size: 12px; }

.key-row { display: flex; gap: 8px; align-items: center; }
.key-row input { flex: 1; }

.eye-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  font-size: 14px;
  flex-shrink: 0;
  transition: border-color 0.2s;
  color: var(--muted);
}
.eye-btn:hover { border-color: var(--accent); }

/* 参数网格 */
.params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.params-grid label { margin-top: 0; }

/* 币种选择 */
.coin-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

.coin-badge {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 5px;
}

.coin-badge.active {
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(123,47,255,0.15));
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 700;
  box-shadow: 0 0 12px rgba(0,212,255,0.15);
}

/* 按钮 */
.btn {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 2px;
  position: relative;
  overflow: hidden;
}

.btn-start {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  box-shadow: 0 4px 24px rgba(0,212,255,0.3);
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,212,255,0.4);
}

.btn-start::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shine 2s infinite;
}

@keyframes shine { 0%{left:-100%} 100%{left:100%} }

.btn-stop {
  background: linear-gradient(135deg, #ff3366, #ff6b35);
  color: white;
  box-shadow: 0 4px 24px rgba(255,51,102,0.3);
}

.btn-stop:hover { transform: translateY(-2px); }

/* 日志 */
.log-box {
  background: #020408;
  border-radius: 10px;
  padding: 12px;
  height: 260px;
  overflow-y: auto;
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  line-height: 2;
  border: 1px solid var(--border);
}

.log-box::-webkit-scrollbar { width: 3px; }
.log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-info { color: #8090a0; }
.log-success { color: var(--green); }
.log-error { color: var(--red); }
.log-warn { color: var(--gold); }
.log-trade { color: var(--accent); }

/* 警告 */
.warning-box {
  background: rgba(255,51,102,0.08);
  border: 1px solid rgba(255,51,102,0.25);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 11px;
  color: rgba(255,150,150,0.9);
  line-height: 1.7;
  margin-bottom: 12px;
}

/* 扫描动画 */
.scanning {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: scan 0.6s infinite alternate;
  margin-right: 6px;
}
@keyframes scan { 0%{opacity:0.3} 100%{opacity:1} }
</style>
</head>
<body>

<div class="header">
  <div class="logo">OKX · AI TRADER</div>
  <div class="logo-sub">GLM Powered · Auto Scan · High Leverage</div>
</div>

<div class="status-bar">
  <div class="status-left">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">系统待机</span>
  </div>
  <div class="status-time" id="clockEl">--:--:--</div>
</div>

<div class="container">

  <!-- 统计 -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" id="statRounds">0</div>
      <div class="stat-label">分析轮次</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statTrades">0</div>
      <div class="stat-label">交易次数</div>
    </div>

      <div class="stat-val" id="statPnl">--</div>
      <div class="stat-label">当前盈亏</div>
    </div>

  <!-- 持仓卡片 -->
  <div class="position-card" id="posCard">
    <div class="pos-header">

  <!-- Keys -->
  <div class="section">

      <input type="password" id="okxKey" placeholder="OKX API Key">
      <button class="eye-btn" onclick="toggleKey('okxKey')">👁</button>
    </div>

    <label>OKX Secret</label>
    <div class="key-row">
      <input type="password" id="okxSecret" placeholder="OKX Secret Key">
      <button class="eye-btn" onclick="toggleKey('okxSecret')">👁</button>
    </div>

    <label>Passphrase</label>
    <div class="key-row">
      <input type="password" id="okxPass" placeholder="OKX Passphrase">
      <button class="eye-btn" onclick="toggleKey('okxPass')">👁</button>
    </div>

  <!-- 参数 -->
  <div class="section">
    <div class="section-title">⚙️ 策略参数</div>
    <div class="params-grid">
      <div>
        <label>杠杆倍数</label>
        <select id="leverage">
          <option value="5">5x 稳健</option>

    <label>扫描币种</label>
    <div class="coin-grid">
      <span class="coin-badge active" data-coin="PEPE-USDT-SWAP">🐸 PEPE</span>
      <span class="coin-badge active" data-coin="WIF-USDT-SWAP">🐕 WIF</span>
      <span class="coin-badge active" data-coin="DOGE-USDT-SWAP">🐶 DOGE</span>
      <span class="coin-badge active" data-coin="BONK-USDT-SWAP">🔥 BONK</span>
      <span class="coin-badge active" data-coin="SHIB-USDT-SWAP">💎 SHIB</span>
      <span class="coin-badge active" data-coin="FLOKI-USDT-SWAP">🚀 FLOKI</span>

  <div class="warning-box">
    ⚠️ 所有Key仅在您的设备本地运行，不经过任何服务器。合约交易风险极高，请在充分了解风险后使用。
  </div>

  <button class="btn btn-start" id="btnStart" onclick="startTrading()">⚡ 启动 AI 自动交易</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopTrading()" style="display:none;margin-top:10px">⛔ 停止交易</button>

  <div class="section" style="margin-top:12px">
    <div class="section-title">📡 实时日志</div>

      <div class="log-info">[ SYSTEM ] 等待启动...</div>

</div>

<script>
let running=false,timer=null,rounds=0,trades=0;
let curPos=null,curSym=null;

// 时钟
setInterval(()=>{
  document.getElementById('clockEl').textContent = new Date().toLocaleTimeString('zh-CN');
},1000);

document.querySelectorAll('.coin-badge').forEach(b=>{
  b.addEventListener('click',()=>b.classList.toggle('active'));
});

function toggleKey(id){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
}

function log(msg,type='info'){
  const box=document.getElementById('logBox');
  const now=new Date().toLocaleTimeString('zh-CN');
  const div=document.createElement('div');
  div.className='log-'+type;
  div.textContent='['+now+'] '+msg;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function setStatus(text,state){
  document.getElementById('statusText').textContent=text;
  document.getElementById('statusDot').className='status-dot '+(state||'');
}

function updateStats(){
  document.getElementById('statRounds').textContent=rounds;
  document.getElementById('statTrades').textContent=trades;
}

function getCoins(){
  return Array.from(document.querySelectorAll('.coin-badge.active')).map(b=>b.dataset.coin);
}

async function getTicker(symbol){
  try{
    const r=await fetch('https://www.okx.com/api/v5/market/ticker?instId='+symbol);
    const d=await r.json();
    if(d.code==='0'&&d.data.length){
      const t=d.data[0];
      const price=parseFloat(t.last);
      const open24=parseFloat(t.sodUtc8)||price;
      return{symbol,price,change_pct:(price-open24)/open24*100,high:parseFloat(t.high24h),low:parseFloat(t.low24h)};
    }
  }catch(e){}
  return null;
}

async function getKlines(symbol){
  try{
    const r=await fetch('https://www.okx.com/api/v5/market/candles?instId='+symbol+'&bar=15m&limit=10');
    const d=await r.json();
    if(d.code==='0')return d.data.reverse().map(c=>({open:parseFloat(c[1]),high:parseFloat(c[2]),low:parseFloat(c[3]),close:parseFloat(c[4])}));
  }catch(e){}
  return[];
}

async function pickBest(){
  const coins=getCoins();
  if(!coins.length)return null;
  log('SCANNING MARKETS...','warn');
  let best=null,score=0;
  for(const c of coins){
    const t=await getTicker(c);
    if(t){
      const s=Math.abs(t.change_pct);
      log(c.split('-')[0]+': '+(t.change_pct>0?'+':'')+t.change_pct.toFixed(2)+'%','info');
      if(s>score){score=s;best=t;}
    }
  }
  if(best)log('TARGET: '+best.symbol.split('-')[0]+' | '+(best.change_pct>0?'+':'')+best.change_pct.toFixed(2)+'%','trade');
  return best;
}

async function askGLM(market,klines){
  const key=document.getElementById('glmKey').value.trim();
  if(!key){log('GLM KEY MISSING','error');return'LONG';}// 没key默认做多

  const ktext=klines.slice(-5).map((k,i)=>'K'+(i+1)+': O='+k.open.toFixed(6)+' C='+k.close.toFixed(6)).join(' | ');
  const prompt='You are a crypto trader. Symbol:'+market.symbol+' Price:'+market.price.toFixed(6)+' 24h:'+market.change_pct.toFixed(2)+'% Klines:'+ktext+'. Reply ONLY: Decision: LONG or SHORT or WAIT\nReason: one sentence';

  try{
    const r=await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
      body:JSON.stringify({model:'glm-4-flash',messages:[{role:'user',content:prompt}],max_tokens:80,temperature:0.3})
    });
    const d=await r.json();
    const reply=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'';
    log('GLM: '+reply.substring(0,60),'trade');
    if(reply.toUpperCase().includes('SHORT'))return'SHORT';
    if(reply.toUpperCase().includes('WAIT'))return'WAIT';
    return'LONG';
  }catch(e){
    log('GLM ERROR: '+e.message,'error');
    // GLM失败时根据涨跌方向自动决策
    return market.change_pct>0?'LONG':'SHORT';
  }
}

async function okxSign(method,path,body=''){
  const ts=new Date().toISOString().replace(/\.\d{3}Z/,'.000Z');
  const msg=ts+method+path+body;
  const key=await crypto.subtle.importKey('raw',new TextEncoder().encode(document.getElementById('okxSecret').value.trim()),{name:'HMAC',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('HMAC',key,new TextEncoder().encode(msg));
  const sign=btoa(String.fromCharCode(...new Uint8Array(sig)));
  return{ts,sign};
}

async function okxReq(method,path,body=null){
  const bodyStr=body?JSON.stringify(body):'';
  const{ts,sign}=await okxSign(method,path,bodyStr);
  try{
    const r=await fetch('https://www.okx.com'+path,{
      method,
      headers:{
        'OK-ACCESS-KEY':document.getElementById('okxKey').value.trim(),
        'OK-ACCESS-SIGN':sign,
        'OK-ACCESS-TIMESTAMP':ts,
        'OK-ACCESS-PASSPHRASE':document.getElementById('okxPass').value.trim(),
        'Content-Type':'application/json'
      },
      body:bodyStr||undefined
    });
    return await r.json();
  }catch(e){return{code:'-1',msg:e.message};}
}

async function placeOrder(symbol,side,price){
  const amount=parseInt(document.getElementById('amount').value);
  const lever=document.getElementById('leverage').value;
  await okxReq('POST','/api/v5/account/set-leverage',{instId:symbol,lever:String(lever),mgnMode:'cross'});
  let sz=Math.max(1,Math.floor(amount/price/10));
  if(['PEPE','BONK','SHIB','FLOKI'].some(x=>symbol.includes(x)))sz=Math.max(1,Math.floor(amount/price/100));
  const result=await okxReq('POST','/api/v5/trade/order',{
    instId:symbol,tdMode:'cross',
    side:side==='LONG'?'buy':'sell',
    posSide:side==='LONG'?'long':'short',
    ordType:'market',sz:String(sz)
  });
  if(result.code==='0'){
    log('ORDER OK: '+side+' '+symbol.split('-')[0]+' x'+lever,'success');
    trades++;updateStats();
    // 更新持仓卡片
    document.getElementById('posCard').className='position-card show'+(side==='SHORT'?' short':'');
    document.getElementById('posSymbol').textContent=symbol.split('-')[0]+' x'+lever;
    document.getElementById('posBadge').textContent=side;
    document.getElementById('posBadge').className='pos-badge '+(side==='LONG'?'long':'short');
    document.getElementById('posPnl').textContent='+0.00%';
    return true;
  }else{
    log('ORDER FAIL: '+result.msg,'error');
    return false;
  }
}

async function closePos(symbol){
  const r=await okxReq('POST','/api/v5/trade/close-position',{instId:symbol,mgnMode:'cross',autoCxl:true});
  if(r.code==='0'){log('POSITION CLOSED','success');document.getElementById('posCard').classList.remove('show');}
}

async function getPnl(symbol){
  const r=await okxReq('GET','/api/v5/account/positions?instId='+symbol);
  if(r.data&&r.data.length)return parseFloat(r.data[0].uplRatio||0);
  return null;
}

async function loop(){
  if(!running)return;
  rounds++;updateStats();
  log('---- ROUND '+rounds+' ----','warn');

  const sl=parseInt(document.getElementById('stopLoss').value)/100;
  const tp=parseInt(document.getElementById('takeProfit').value)/100;

  if(curPos&&curSym){
    const pnl=await getPnl(curSym);
    if(pnl!==null){
      const pct=(pnl*100).toFixed(2);
      const pnlEl=document.getElementById('statPnl');
      pnlEl.textContent=(pnl>0?'+':'')+pct+'%';
      pnlEl.className='stat-val '+(pnl>0?'green':'red');
      const posPnl=document.getElementById('posPnl');
      posPnl.textContent=(pnl>0?'+':'')+pct+'%';
      posPnl.className='pos-pnl '+(pnl>0?'positive':'negative');
      log('PNL: '+(pnl>0?'+':'')+pct+'%',pnl>0?'success':'error');
      if(pnl<=-sl){log('STOP LOSS HIT!','error');await closePos(curSym);curPos=null;curSym=null;schedNext();return;}
      if(pnl>=tp){log('TAKE PROFIT HIT!','success');await closePos(curSym);curPos=null;curSym=null;schedNext();return;}
    }
  }

  const best=await pickBest();
  if(!best){schedNext();return;}

  if(curPos&&curSym&&curSym!==best.symbol){
    log('SWITCHING TARGET','warn');
    await closePos(curSym);curPos=null;curSym=null;
    await new Promise(r=>setTimeout(r,2000));
  }

  const klines=await getKlines(best.symbol);
  const decision=await askGLM(best,klines);
  log('DECISION: '+decision,decision==='WAIT'?'info':'trade');

  if(!curPos){
    if(decision!=='WAIT'){
      const ok=await placeOrder(best.symbol,decision,best.price);
      if(ok){curPos=decision;curSym=best.symbol;}
    }else{log('WAITING FOR SIGNAL...','info');}
  }else{
    const opp=curPos==='LONG'?'SHORT':'LONG';
    if(decision===opp){
      log('REVERSING POSITION','warn');
      await closePos(curSym);
      await new Promise(r=>setTimeout(r,2000));
      const ok=await placeOrder(best.symbol,opp,best.price);
      if(ok){curPos=opp;curSym=best.symbol;}
    }else{log('HOLDING '+curPos,'info');}
  }
  schedNext();
}

function schedNext(){
  if(!running)return;
  const iv=parseInt(document.getElementById('interval').value);
  log('NEXT SCAN IN '+iv+'s...','info');
  timer=setTimeout(loop,iv*1000);
}

function startTrading(){
  const keys=['glmKey','okxKey','okxSecret','okxPass'];
  const missing=keys.filter(k=>!document.getElementById(k).value.trim());
  if(missing.length>0){alert('请填写所有API Key！');return;}
  running=true;rounds=0;trades=0;
  document.getElementById('logBox').innerHTML='';
  document.getElementById('btnStart').style.display='none';
  document.getElementById('btnStop').style.display='block';
  setStatus('AI运行中 · 自动交易','running');
  log('SYSTEM ONLINE','success');
  log('LEVERAGE: '+document.getElementById('leverage').value+'x | AMOUNT: '+document.getElementById('amount').value+'U','info');
  loop();
}

function stopTrading(){
  running=false;
  if(timer)clearTimeout(timer);
  document.getElementById('btnStart').style.display='block';
  document.getElementById('btnStop').style.display='none';
  setStatus('系统待机','');
  log('SYSTEM OFFLINE','warn');
}
</script>
